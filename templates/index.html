<!DOCTYPE html>
<html>
<head>
    <title>Customer Churn Prediction</title>
</head>
<body>

<h2>Customer Churn Prediction</h2>

<form action="/predict" method="post">

    Tenure: <input type="text" name="tenure"><br><br>

    Monthly Charges: <input type="text" name="MonthlyCharges"><br><br>

    Total Charges: <input type="text" name="TotalCharges"><br><br>

    Contract (0/1/2): <input type="text" name="Contract"><br><br>

    Internet Service (0/1/2): <input type="text" name="InternetService"><br><br>

    Payment Method (0/1/2/3): <input type="text" name="PaymentMethod"><br><br>

    Tech Support (0/1): <input type="text" name="TechSupport"><br><br>

    Online Security (0/1): <input type="text" name="OnlineSecurity"><br><br>

    <button type="submit">Predict</button>

</form>

<h3>{{ prediction_text }}</h3>

</body>
</html>
